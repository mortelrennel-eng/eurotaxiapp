name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script: |
            cd /home/u747826271/domains/eurotaxisystem.site/public_html
            
            # Put site in maintenance mode
            php artisan down || true
            
            # Fetch latest changes
            git fetch origin main
            git reset --hard origin/main
            
            # Install/Update dependencies
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # Synchronize public assets to the web root and fix paths
            # This is the "God-Level" Hostinger Fix
            rsync -av --exclude="storage" public/ .
            sed -i 's|../vendor|vendor|g' index.php
            sed -i 's|../bootstrap|bootstrap|g' index.php
            
            # Ensure storage link exists
            php artisan storage:link --force || true
            
            # Run database migrations
            php artisan migrate --force
            
            # Clear and rebuild cache PROTECTIVELY
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            # Note: We avoid 'artisan optimize' if it causes path issues, 
            # but standard Hostinger setup usually handles it if paths are fixed.
            php artisan optimize
            
            # Fix permissions for storage and cache (Standard 500 Fix)
            chmod -R 775 storage bootstrap/cache
            
            # Bring site back online
            php artisan up
